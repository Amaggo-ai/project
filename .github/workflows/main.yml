name: Maven Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Java environment
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Build with Maven (set working directory if needed)
      - name: Build with Maven
        run: mvn -f ./pom.xml clean install

      # Step 4: Deploy using SSH
      - name: SSH into Server and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
          # Stop Tomcat - sudo systemctl stop tomcat
          # Remove old WAR file - sudo rm -rf /opt/tomcat/webapps/my-app.war
          # Copy new WAR file - sudo cp target/my-app.war /opt/tomcat/webapps/
          # Start Tomcat - sudo systemctl start tomcat
   
